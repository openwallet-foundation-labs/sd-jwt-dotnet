<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">SD-JWT .NET Ecosystem Architecture</title>
  <desc id="desc">A hub-and-spoke infographic showing SdJwt.Net as the RFC 9901 core, with credential wallet interoperability on the left and preview delegated agent trust on the right.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#061826"/>
      <stop offset="0.56" stop-color="#0B2440"/>
      <stop offset="1" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.085"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.040"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F3F7FB"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#065F55"/>
      <stop offset="1" stop-color="#062B28"/>
    </linearGradient>
    <linearGradient id="callout" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#134E4A" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#3730A3" stop-opacity="0.68"/>
    </linearGradient>
    <filter id="softShadow" x="-18%" y="-28%" width="136%" height="156%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#020617" flood-opacity="0.24"/>
    </filter>
    <filter id="glowTeal" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#5EEAD4" flood-opacity="0.40"/>
    </filter>
    <marker id="arrowTeal" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M2,2 L12,7 L2,12 Z" fill="#5EEAD4"/>
    </marker>
    <marker id="arrowBlue" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M2,2 L12,7 L2,12 Z" fill="#93C5FD"/>
    </marker>
    <marker id="arrowPurple" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M2,2 L12,7 L2,12 Z" fill="#A78BFA"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="118" cy="38" r="260" fill="#0F766E" opacity="0.17"/>
  <circle cx="1370" cy="125" r="255" fill="#1D4ED8" opacity="0.20"/>
  <circle cx="1320" cy="760" r="285" fill="#6D28D9" opacity="0.20"/>
  <circle cx="110" cy="815" r="190" fill="#0F766E" opacity="0.13"/>

  <text x="76" y="86" font-family="Inter, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="46" font-weight="800" fill="#F8FAFC" letter-spacing="1">SD-JWT .NET Ecosystem Architecture</text>
  <text x="78" y="130" font-family="Inter, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="22" font-weight="500" fill="#D7E1EA">One standards core with two adoption tracks: credential / wallet interoperability and preview delegated agent trust.</text>

  <!-- Track headers -->
  <rect x="88" y="170" width="595" height="68" rx="34" fill="#0B3647" stroke="#0891B2" stroke-width="1.2" opacity="0.84"/>
  <path d="M136 189l14.4 5.6v12c0 12-7.2 20-14.4 24.8c-7.2-6-14.4-14-14.4-26V193.4z" fill="none" stroke="#67E8F9" stroke-width="3"/>
  <path d="M130 207.8l4.4 4.4l9.2-10.4" fill="none" stroke="#67E8F9" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="178" y="213" font-family="Inter, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="25" font-weight="800" fill="#67E8F9">Digital credential &amp; wallet interoperability</text>

  <rect x="950" y="170" width="540" height="68" rx="34" fill="#261B55" stroke="#8B5CF6" stroke-width="1.2" opacity="0.86"/>
  <path d="M1002 189l14.4 5.6v12c0 12-7.2 20-14.4 24.8c-7.2-6-14.4-14-14.4-26V193.4z" fill="none" stroke="#C4B5FD" stroke-width="3"/>
  <circle cx="1002" cy="203.8" r="5.2" fill="none" stroke="#C4B5FD" stroke-width="3"/>
  <path d="M994 215c4-4.8 12-4.8 16 0" fill="none" stroke="#C4B5FD" stroke-width="3" stroke-linecap="round"/>
  <text x="1046" y="213" font-family="Inter, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="25" font-weight="800" fill="#C4B5FD">Preview delegated agent trust</text>

  <!-- Main panels -->
  <rect x="75" y="252" width="610" height="535" rx="30" fill="url(#panel)" stroke="#D6E5F4" stroke-width="1" opacity="0.90"/>
  <rect x="982" y="252" width="520" height="535" rx="30" fill="url(#panel)" stroke="#D6E5F4" stroke-width="1" opacity="0.90"/>

  <!-- Core -->
  <circle cx="814" cy="448" r="138" fill="#0B3B37" opacity="0.50"/>
  <circle cx="814" cy="448" r="124" fill="url(#core)" stroke="#5EEAD4" stroke-width="6" filter="url(#glowTeal)"/>
  <text x="814" y="423" font-family="Inter, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="38" font-weight="800" fill="#F8FAFC" text-anchor="middle">SdJwt.Net</text>
  <text x="814" y="463" font-family="Inter, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="27" font-weight="800" fill="#5EEAD4" text-anchor="middle">RFC 9901 Core</text>
  <text x="814" y="502" font-family="Inter, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="22" font-weight="500" fill="#E2E8F0" text-anchor="middle">issue • disclose</text>
  <text x="814" y="531" font-family="Inter, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="22" font-weight="500" fill="#E2E8F0" text-anchor="middle">present • verify</text>

  <!-- Left cards: deliberately vertical to prevent overlap -->
  <g filter="url(#softShadow)">
    <rect x="105" y="278" width="455" height="104" rx="18" fill="url(#card)" stroke="#DCE9F5"/>
    <rect x="105" y="278" width="14" height="104" rx="14" fill="#2DD4BF"/>
    <rect x="140" y="313" width="38" height="45" rx="4" fill="none" stroke="#2DD4BF" stroke-width="3"/>
    <path d="M150 329h22M150 342h25M150 355h16" stroke="#2DD4BF" stroke-width="3" stroke-linecap="round"/>
    <text x="215" y="320" font-family="Inter, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="22" font-weight="800" fill="#0F172A">Credential formats</text>
    <text x="215" y="354" font-family="Inter, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="18" font-weight="500" fill="#334155">
      <tspan x="215" dy="0">SD-JWT VC • Status List</tspan>
      <tspan x="215" dy="25">mdoc • W3C VCDM • HAIP</tspan>
    </text>

    <rect x="105" y="418" width="455" height="112" rx="18" fill="url(#card)" stroke="#DCE9F5"/>
    <rect x="105" y="418" width="14" height="112" rx="14" fill="#22D3EE"/>
    <rect x="154" y="451" width="18" height="18" rx="4" fill="none" stroke="#22D3EE" stroke-width="3"/>
    <rect x="140" y="483" width="18" height="18" rx="4" fill="none" stroke="#22D3EE" stroke-width="3"/>
    <rect x="168" y="483" width="18" height="18" rx="4" fill="none" stroke="#22D3EE" stroke-width="3"/>
    <path d="M163 470L151 482M163 470L175 482" stroke="#22D3EE" stroke-width="3"/>
    <text x="215" y="460" font-family="Inter, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="22" font-weight="800" fill="#0F172A">Protocol &amp; interoperability</text>
    <text x="215" y="494" font-family="Inter, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="18" font-weight="500" fill="#334155">
      <tspan x="215" dy="0">OID4VCI • OID4VP incl. DC API</tspan>
      <tspan x="215" dy="25">SIOPv2 • PEX • Federation</tspan>
    </text>

    <rect x="105" y="566" width="455" height="104" rx="18" fill="url(#card)" stroke="#DCE9F5"/>
    <rect x="105" y="566" width="14" height="104" rx="14" fill="#F59E0B"/>
    <path d="M140 610h45a7 7 0 0 1 7 7v30H147a7 7 0 0 1-7-7z" fill="none" stroke="#B45309" stroke-width="3"/>
    <path d="M140 624h50v18h-15a7 7 0 0 0 0 14h12" fill="none" stroke="#B45309" stroke-width="3"/>
    <circle cx="176" cy="642" r="3" fill="#B45309"/>
    <text x="215" y="608" font-family="Inter, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="22" font-weight="800" fill="#0F172A">Wallet &amp; EUDIW reference</text>
    <text x="215" y="642" font-family="Inter, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="18" font-weight="500" fill="#334155">
      <tspan x="215" dy="0">Reference infrastructure for</tspan>
      <tspan x="215" dy="25">wallet and ARF-style systems</tspan>
    </text>

    <rect x="105" y="696" width="455" height="88" rx="18" fill="url(#card)" stroke="#DCE9F5"/>
    <rect x="105" y="696" width="14" height="88" rx="14" fill="#60A5FA"/>
    <rect x="140" y="724" width="15" height="15" rx="3" fill="none" stroke="#3B82F6" stroke-width="3"/>
    <rect x="163" y="724" width="15" height="15" rx="3" fill="none" stroke="#3B82F6" stroke-width="3"/>
    <rect x="140" y="748" width="15" height="15" rx="3" fill="none" stroke="#3B82F6" stroke-width="3"/>
    <rect x="163" y="748" width="15" height="15" rx="3" fill="none" stroke="#3B82F6" stroke-width="3"/>
    <text x="215" y="730" font-family="Inter, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="22" font-weight="800" fill="#0F172A">Applications</text>
    <text x="215" y="758" font-family="Inter, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="17" font-weight="500" fill="#334155">
      <tspan x="215" dy="0">Issuers • verifiers</tspan>
      <tspan x="215" dy="23">wallet frameworks</tspan>
    </text>
  </g>

  <!-- Left flow arrows -->
  <path d="M300 384 L300 412" fill="none" stroke="#5EEAD4" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowTeal)" opacity="0.88"/>
  <path d="M300 532 L300 560" fill="none" stroke="#5EEAD4" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowTeal)" opacity="0.88"/>
  <path d="M300 672 L300 690" fill="none" stroke="#60A5FA" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowBlue)" opacity="0.88"/>
  <path d="M560 330 C625 330 663 370 682 426" fill="none" stroke="#5EEAD4" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowTeal)" opacity="0.86"/>

  <!-- Right cards -->
  <g filter="url(#softShadow)">
    <rect x="1100" y="300" width="400" height="165" rx="18" fill="url(#card)" stroke="#DCE9F5"/>
    <rect x="1100" y="300" width="14" height="165" rx="14" fill="#A855F7"/>
    <path d="M1158 336l18.7 7.3v15.6c0 15.6-9.4 26-18.7 32.2c-9.4-7.2-18.7-17.6-18.7-33.2v-15.6z" fill="none" stroke="#7C3AED" stroke-width="3"/>
    <circle cx="1158" cy="356" r="6.8" fill="none" stroke="#7C3AED" stroke-width="3"/>
    <path d="M1147.6 370.4c5.2-6.2 15.6-6.2 20.8 0" fill="none" stroke="#7C3AED" stroke-width="3" stroke-linecap="round"/>
    <text x="1210" y="342" font-family="Inter, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="22" font-weight="800" fill="#0F172A">Agent Trust packages</text>
    <text x="1210" y="376" font-family="Inter, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="18" font-weight="500" fill="#334155">
      <tspan x="1210" dy="0">Capability SD-JWTs</tspan>
      <tspan x="1210" dy="25">Policy • MCP/API guards</tspan>
      <tspan x="1210" dy="25">A2A • OpenTelemetry • OPA</tspan>
    </text>

    <rect x="1100" y="588" width="400" height="136" rx="18" fill="url(#card)" stroke="#DCE9F5"/>
    <rect x="1100" y="588" width="14" height="136" rx="14" fill="#A855F7"/>
    <rect x="1134" y="622" width="47" height="16" rx="4" fill="none" stroke="#7C3AED" stroke-width="3"/>
    <circle cx="1146" cy="630" r="2.3" fill="#7C3AED"/>
    <rect x="1134" y="644" width="47" height="16" rx="4" fill="none" stroke="#7C3AED" stroke-width="3"/>
    <circle cx="1146" cy="652" r="2.3" fill="#7C3AED"/>
    <rect x="1134" y="666" width="47" height="16" rx="4" fill="none" stroke="#7C3AED" stroke-width="3"/>
    <circle cx="1146" cy="674" r="2.3" fill="#7C3AED"/>
    <text x="1210" y="630" font-family="Inter, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="22" font-weight="800" fill="#0F172A">Execution targets</text>
    <text x="1210" y="664" font-family="Inter, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="18" font-weight="500" fill="#334155">
      <tspan x="1210" dy="0">Enterprise APIs</tspan>
      <tspan x="1210" dy="25">agent runtimes</tspan>
      <tspan x="1210" dy="25">tool servers</tspan>
    </text>
  </g>

  <!-- Right flow arrows -->
  <path d="M945 430 C1002 392 1045 386 1092 390" fill="none" stroke="#A78BFA" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowPurple)" opacity="0.88"/>
  <path d="M1284 468 L1284 582" fill="none" stroke="#A78BFA" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowPurple)" opacity="0.88"/>

  <!-- Bottom principle -->
  <rect x="150" y="810" width="1300" height="62" rx="24" fill="url(#callout)" stroke="#2B5D83" stroke-width="1.1" opacity="0.94"/>
  <circle cx="301" cy="841" r="16.8" fill="none" stroke="#5EEAD4" stroke-width="3"/>
  <path d="M301 826.7v6.7M301 848.6v6.7M286.7 841h6.7M308.6 841h6.7" stroke="#5EEAD4" stroke-width="3" stroke-linecap="round"/>
  <text x="330" y="836" font-family="Inter, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="22" font-weight="800" fill="#5EEAD4">Adoption principle:</text>
  <text x="545" y="836" font-family="Inter, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="22" font-weight="500" fill="#E5E7EB">start with the smallest package set for the use case.</text>
  <text x="330" y="862" font-family="Inter, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="19" font-weight="500" fill="#CBD5E1">Add protocols, reference infrastructure, or preview trust extensions only when needed.</text>
</svg>