<path d="M750.0 526 L750.0 538" fill="none" stroke="#93C5FD" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowBlue)" opacity="0.75"/>
<path d="M750.0 642 L750.0 654" fill="none" stroke="#93C5FD" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowBlue)" opacity="0.75"/>
<line x1="1430" y1="205" x2="1430" y2="758" stroke="#93C5FD" stroke-width="4" opacity="0.72" marker-end="url(#arrowBlue)"/>
<text x="1464" y="485" transform="rotate(90 1464 485)" font-family="Inter, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="21" font-weight="700" fill="#D7E1EA" text-anchor="middle" letter-spacing="1">dependencies flow downward</text>
<rect x="162" y="824" width="1276" height="50" rx="25" fill="url(#callout)" stroke="#2B5D83" stroke-width="1.1" opacity="0.96"/>
<path d="M214.0 836l13.68 5.32v11.4c0 11.4-6.84 19.0-13.68 23.56C207.16 870.48 200.32 862.88 200.32 851.48V840.08z" fill="none" stroke="#93C5FD" stroke-width="3"/><path d="M208.3 853.76l4.18 4.18 8.74-9.88" fill="none" stroke="#93C5FD" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
<text x="252" y="857" font-family="Inter, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="21" font-weight="800" fill="#F8FAFC" text-anchor="start">Separation of concerns:</text>
<text x="502" y="857" font-family="Inter, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="20" font-weight="500" fill="#E5E7EB" text-anchor="start">small core, modular protocols, bounded reference packages, clearly labelled preview extensions.</text>
</svg>