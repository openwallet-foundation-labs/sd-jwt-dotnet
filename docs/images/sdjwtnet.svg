<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1536 1024" role="img" aria-labelledby="title desc">
  <title id="title">SD-JWT .NET Logo</title>
  <desc id="desc">Purple SD-JWT .NET logo with shield, lock, and selective disclosure orbit motif.</desc>
  <defs>
    <radialGradient id="discGradient" cx="42%" cy="34%" r="72%">
      <stop offset="0%" stop-color="#b86cff"/>
      <stop offset="45%" stop-color="#8f3ee7"/>
      <stop offset="76%" stop-color="#6d20cf"/>
      <stop offset="100%" stop-color="#5517ae"/>
    </radialGradient>

    <linearGradient id="ringGradient" x1="390" y1="230" x2="1085" y2="805" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f4dfff"/>
      <stop offset="24%" stop-color="#ffffff"/>
      <stop offset="58%" stop-color="#c28bff"/>
      <stop offset="100%" stop-color="#7d2be0"/>
    </linearGradient>

    <linearGradient id="swooshGradient" x1="438" y1="610" x2="1005" y2="735" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.98"/>
      <stop offset="46%" stop-color="#e4c7ff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#a052eb" stop-opacity="0.65"/>
    </linearGradient>

    <linearGradient id="textGradient" x1="515" y1="375" x2="960" y2="580" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="65%" stop-color="#f5ecff"/>
      <stop offset="100%" stop-color="#d9c2ff"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#220044" flood-opacity="0.36"/>
    </filter>

    <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#270044" flood-opacity="0.65"/>
    </filter>

    <filter id="innerGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="7" result="blur"/>
      <feOffset dy="-4" result="offset"/>
      <feFlood flood-color="#f2d8ff" flood-opacity="0.55" result="color"/>
      <feComposite in="color" in2="offset" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="SourceGraphic"/>
        <feMergeNode in="glow"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Transparent canvas: intentionally no background rectangle. -->
  <g id="sd-jwt-dotnet-logo" transform="translate(0 0)">
    <!-- Main medallion -->
    <ellipse cx="768" cy="512" rx="323" ry="319" fill="url(#discGradient)" filter="url(#softShadow)"/>
    <ellipse cx="768" cy="512" rx="302" ry="299" fill="none" stroke="#6f22d3" stroke-width="30" opacity="0.42"/>
    <ellipse cx="768" cy="512" rx="286" ry="278" fill="none" stroke="#d9b8ff" stroke-width="9" opacity="0.88"/>
    <ellipse cx="768" cy="512" rx="262" ry="253" fill="none" stroke="#f7eaff" stroke-width="4" opacity="0.86"/>

    <!-- Orbital selective-disclosure motif -->
    <path d="M 470 601
             C 552 690, 750 706, 951 602
             C 870 736, 628 753, 493 642
             C 486 636, 478 621, 470 601 Z"
          fill="url(#swooshGradient)" opacity="0.95"/>
    <path d="M 485 415
             C 522 282, 707 211, 895 238
             C 1010 255, 1072 323, 1079 386
             C 1016 302, 865 270, 719 292
             C 602 310, 514 359, 485 415 Z"
          fill="#f4d8ff" opacity="0.58"/>
    <path d="M 962 590
             C 901 690, 782 748, 635 734
             C 768 786, 966 742, 1026 560
             C 1011 575, 988 584, 962 590 Z"
          fill="#4d149e" opacity="0.34"/>
    <path d="M 451 568
             C 520 665, 695 691, 889 650"
          fill="none" stroke="#f3dcff" stroke-width="12" stroke-linecap="round" opacity="0.68"/>

    <!-- Shield and lock -->
    <g id="shield-lock" transform="translate(0 0)" filter="url(#innerGlow)">
      <path d="M 768 210
               C 807 232, 836 239, 873 239
               L 873 292
               C 873 342, 829 369, 768 393
               C 707 369, 663 342, 663 292
               L 663 239
               C 700 239, 729 232, 768 210 Z"
            fill="none" stroke="#f4e4ff" stroke-width="16" stroke-linejoin="round" opacity="0.95"/>
      <rect x="740" y="289" width="56" height="54" rx="8" fill="#f6e8ff" opacity="0.95"/>
      <path d="M 750 288
               L 750 266
               C 750 244, 786 244, 786 266
               L 786 288"
            fill="none" stroke="#f6e8ff" stroke-width="13" stroke-linecap="round"/>
      <path d="M 768 311 L 768 329" stroke="#6f24cf" stroke-width="8" stroke-linecap="round"/>
    </g>

    <!-- Logo text -->
    <g id="wordmark" filter="url(#textShadow)" text-anchor="middle" font-family="Inter, Segoe UI, Arial, Helvetica, sans-serif" font-weight="900" fill="url(#textGradient)">
      <text x="768" y="479" font-size="112" letter-spacing="3">SD JWT</text>
      <text x="768" y="590" font-size="96" letter-spacing="2">.NET</text>
    </g>

    <!-- Subtle lower depth -->
    <ellipse cx="770" cy="704" rx="227" ry="77" fill="#3f0d86" opacity="0.16"/>
  </g>
</svg>
