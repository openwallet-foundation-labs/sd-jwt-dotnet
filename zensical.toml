[project.theme]
variant = "modern"
custom_dir = "docs/overrides"
features = [
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.sections",
  "navigation.indexes",
  "navigation.path",
  "navigation.top",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.instant.progress",
  "navigation.tracking",
  "navigation.prune",
  "toc.follow",
  "search.suggest",
  "search.highlight",
]

[[project.theme.palette]]
scheme = "slate"
primary = "indigo"
accent = "indigo"
toggle = { icon = "material/brightness-7", name = "Switch to light mode" }

[[project.theme.palette]]
scheme = "default"
primary = "indigo"
accent = "indigo"
toggle = { icon = "material/brightness-4", name = "Switch to dark mode" }

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]

[project.markdown_extensions.toc]
permalink = true

[project.plugins.search]
